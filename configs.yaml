# 3D Manta Ray Multi-Task environment (locomotion skills)
manta_multitask:
  env_type: 'manta_multitask'
  time_limit: 2000
  lbm_nx: 200
  lbm_ny: 200
  lbm_nz: 80
  lbm_scale: 1.0    # 0.8 × 250 = 200 = 1.0 × 200: robot grid size unchanged
  fluid_density: 1000.0
  per_frame_steps: 10

  # Multi-task settings
  task_switch_interval: 0       # 0 = switch only at episode reset; >0 = switch every N steps
  enabled_tasks: [forward, turn_left, turn_right, ascend, descend]
  control_mode: 'direct'        # 'frequency' = Fourier coefficients, 'direct' = actuator target angles

  # Task reward weights
  reward_w_task: 1.0
  reward_w_roll: 0.10           # keep posture penalties very gentle
  reward_w_smooth: 0.015        # very small angular/control regularization
  reward_w_offaxis: 0.02        # small task-irrelevant drift penalty

  # Reward scales only (not hard target speeds)
  target_forward_vel: 0.20
  target_yaw_rate: 0.15
  target_vertical_vel: 0.12

  # Frequency-domain PD control (Paper Section 3 & 5)
  # NN outputs (A, C) params → Fourier synthesis → θ* targets → MuJoCo PD actuators
  k_harmonics: 2              # K: number of frequency components per group
  b_bar: 1.0                  # B̄: max frequency multiplier
  use_reduced_order: true     # Reduced-order: wing joints share control signals (11→5 groups)

  steps: 2e6
  action_repeat: 1
  envs: 4
  prefill: 4000
  train_ratio: 512
  eval_every: 24000
  eval_episode_num: 1
  video_pred_log: false
  encoder: {mlp_keys: '.*', cnn_keys: '$^'}
  decoder: {mlp_keys: '.*', cnn_keys: '$^'}

