# 3D Eel hierarchical control:
# high-level Dreamer selects one locomotion primitive every `skill_horizon` low-level steps.
eel_hierarchical:
  env_type: 'eel_hierarchical'
  time_limit: 80               # macro steps, not low-level physics steps
  lbm_nx: 150
  lbm_ny: 250
  lbm_nz: 60
  lbm_scale: 0.5
  fluid_density: 1000.0
  per_frame_steps: 10

  # Frozen low-level multitask controller
  lowlevel_logdir: 'logdir/eel_multitask'
  lowlevel_configs: [lbm3d, eel_multitask]
  skill_horizon: 25
  enabled_tasks: [forward, turn_left, turn_right, ascend, descend]
  control_mode: 'direct'

  # High-level navigation task
  single_goal_mode: true
  goal_position: [0.5, 0.75, 0.5]
  goal_region_min: [0.15, 0.45, 0.20]
  goal_region_max: [0.85, 0.85, 0.80]
  goal_threshold: 0.08

  # High-level reward
  progress_reward_scale: 10.0
  success_bonus: 5.0
  time_penalty: 0.01
  switch_penalty: 0.01
  terminated_penalty: 1.0
  boundary_margin_penalty_scale: 0.15
  soft_boundary_margin: 0.12

  # Low-level env reward scales kept only for frozen skill execution
  reward_w_task: 1.0
  reward_w_roll: 0.20
  reward_w_smooth: 0.03
  reward_w_offaxis: 0.04
  target_forward_vel: 0.12
  target_yaw_rate: 0.08
  target_vertical_vel: 0.05
  k_harmonics: 2
  b_bar: 1.0
  use_reduced_order: true

  # Dreamer high-level policy should output one-hot skill choices
  actor:
    {layers: 2, dist: 'onehot', entropy: 1e-3, unimix_ratio: 0.01, std: 'learned', min_std: 0.1, max_std: 1.0, temp: 0.1, lr: 3e-5, eps: 1e-5, grad_clip: 100.0, outscale: 1.0}

  steps: 5e5
  action_repeat: 1
  envs: 4
  prefill: 2000
  train_ratio: 512
  eval_every: 24000
  eval_episode_num: 1
  video_pred_log: false
  encoder: {mlp_keys: '.*', cnn_keys: '$^'}
  decoder: {mlp_keys: '.*', cnn_keys: '$^'}

# 3D Eel with Multi-Sine Control (频域PD控制)
eel3d_multi_sine:
  env_type: 'eel3d'
  time_limit: 2000
  lbm_nx: 150
  lbm_ny: 250
  lbm_nz: 60
  lbm_scale: 0.5
  fluid_density: 1000.0
  goal_threshold: 0.08
  single_goal_mode: true
  goal_position: [0.5, 0.75, 0.5]
  per_frame_steps: 10
  
  # Multi-sine wave control
  control_mode: 'multi_sine'
  multi_sine_K: 3        # K=3: 3 frequency components
  multi_sine_B_bar: 1.0  # B_j = j * B_bar / K
  # Action dim = 7 * K * 2 = 42 (A: 21, C: 21)
  
  steps: 1e6
  action_repeat: 1
  envs: 4
  prefill: 8000
  train_ratio: 512
  eval_every: 24000
  eval_episode_num: 4
  video_pred_log: false
  encoder: {mlp_keys: '.*', cnn_keys: '$^'}
  decoder: {mlp_keys: '.*', cnn_keys: '$^'}

# ============================================================
# SB3 Training Defaults (used by train_sb3.py)
# ============================================================
sb3_defaults:
  # Environment
  env_type: 'starfish3d_mg'
  nworld: 4
  lbm_nx: 100
  lbm_ny: 100
  lbm_nz: 80
  lbm_scale: 0.5
  fluid_density: 1000.0
  time_limit: 2000
  goal_threshold: 0.08
  single_goal_mode: true
  goal_position: [0.5, 0.75, 0.5]
  per_frame_steps: 20
  control_mode: 'direct'
  multi_sine_K: 3
  multi_sine_B_bar: 1.0
  # Optional manta_multitask reward/task switches
  disable_speed_targets: false
  use_direction_dist_tasks: false
  direction_dist_min: 0.12
  direction_dist_max: 0.25
  direction_goal_threshold: 0.06
  direction_dist_w_dist: 40.0
  direction_dist_w_roll: 0.3
  direction_dist_w_heading: 0.3
  direction_dist_w_forward: 0.2
  direction_dist_goal_bonus: 10.0
  direction_dist_terminate_on_goal: true
  alive_cost: 0.0
  termination_penalty: 1.0

  # VecNormalize (observation & reward normalization, similar to Dreamer's RewardEMA)
  normalize_obs: false
  normalize_reward: false

  # Training
  algo: 'PPO'
  steps: 1e5
  seed: 42
  device: 'cuda:0'
  logdir: 'sb3_logs/default'
  resume: false
  save_freq: 10000
  checkpoint_every: 0  # Save numbered checkpoints every N env steps (0 = disabled)
  log_interval: 1

  # Shared hyperparams  (aligned with DreamerV3 defaults for fair comparison)
  lr: 3e-5
  gamma: 0.997
  batch_size: 64

  # On-policy (PPO, TRPO)
  n_steps: 512
  n_epochs: 10
  ent_coef: 0.01
  gae_lambda: 0.95
  clip_range: 0.2
  lstm_hidden_size: 128
  n_lstm_layers: 1
  shared_lstm: false
  enable_critic_lstm: true

  # Off-policy (SAC, TD3, DDPG)
  buffer_size: 1000000
  tau: 0.005
  learning_starts: 8000

