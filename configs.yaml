# 3D Eel Multi-Task environment (12-segment, biomimetic grouped control)
eel_multitask:
  env_type: 'eel_multitask'
  time_limit: 2000
  lbm_nx: 150
  lbm_ny: 250
  lbm_nz: 60
  lbm_scale: 0.5
  fluid_density: 1000.0
  per_frame_steps: 10

  # Multi-task settings
  task_switch_interval: 0       # 0 = switch only at episode reset; >0 = switch every N steps
  enabled_tasks: [forward, turn_left, turn_right, ascend, descend]
  # control_mode options:
  #   'wave'      — physics-parameterized traveling wave, 5-dim [A, omega, k_wave, head_bias, roll]
  #                 Built-in amplitude envelope + spatial phase gradient. Recommended.
  #   'direct'    — 5-dim grouped targets (4 yaw groups + 1 roll), for ablation
  #   'frequency' — 20-dim Fourier coefficients (5 groups x 2 harmonics x 2 params)
  control_mode: 'wave'

  # Task reward weights (tuned for eel: barrel-roll vertical strategy)
  reward_w_task: 1.0
  reward_w_roll: 0.20           # highest during FORWARD: 8-segment chain is very roll-prone
  reward_w_smooth: 0.03         # highest: serial chain end-effector amplification
  reward_w_offaxis: 0.04        # highest: traveling wave produces lateral force

  # Target velocities (eel-specific, barrel-roll strategy)
  target_forward_vel: 0.12      # higher than clownfish: 8-segment wave is efficient
  target_yaw_rate: 0.08         # lowest: long body has large turning radius
  target_vertical_vel: 0.05     # barrel-roll vertical: Yaw wave redirected upward

  # Frequency-domain PD control (used when control_mode='frequency')
  k_harmonics: 2
  b_bar: 1.0
  use_reduced_order: true       # 22 joints → 5 groups (4 yaw groups + 1 unified roll group)

  steps: 2e6
  action_repeat: 4
  envs: 4
  prefill: 5000
  train_ratio: 512
  eval_every: 24000
  eval_episode_num: 1
  video_pred_log: false
  encoder: {mlp_keys: '.*', cnn_keys: '$^'}
  decoder: {mlp_keys: '.*', cnn_keys: '$^'}
  actor: {entropy: 1e-2}

# 3D Eel Multi-Task with mid-episode switching (harder curriculum)
eel_multitask_switch:
  env_type: 'eel_multitask'
  time_limit: 2000
  # ── High-performance LBM grid (unchanged) ──
  lbm_nx: 150
  lbm_ny: 250
  lbm_nz: 60
  lbm_scale: 0.5
  fluid_density: 1000.0
  per_frame_steps: 10
  task_switch_interval: 200     # switch task every 200 steps within episode
  enabled_tasks: [forward, turn_left, turn_right, ascend, descend]
  control_mode: 'wave'

  # Reward weights
  reward_w_task: 1.0
  reward_w_roll: 0.20
  reward_w_smooth: 0.03
  reward_w_offaxis: 0.04
  target_forward_vel: 0.12
  target_yaw_rate: 0.08
  target_vertical_vel: 0.05

  # Frequency-domain PD control
  k_harmonics: 2
  b_bar: 1.0
  use_reduced_order: true

  # ── High-performance training footprint ──
  steps: 2e6
  action_repeat: 4
  envs: 4
  prefill: 5000
  batch_size: 16
  batch_length: 64
  train_ratio: 512
  eval_every: 24000
  eval_episode_num: 1
  video_pred_log: false

  # ── Full-size Dreamer world model ──
  dyn_hidden: 512
  dyn_deter: 512
  dyn_stoch: 32
  dyn_discrete: 32
  units: 512
  imag_horizon: 15

  encoder: {mlp_keys: '.*', cnn_keys: '$^', mlp_layers: 4, mlp_units: 512}
  decoder: {mlp_keys: '.*', cnn_keys: '$^', mlp_layers: 4, mlp_units: 512}

  # Guided prefill: inject heuristic wave actions during prefill for better exploration
  # Each preset is [A, omega, k_wave, head_bias, roll]
  prefill_guided_ratio: 0.5      # 50% of prefill steps use guided actions
  prefill_guided_noise: 0.10     # Gaussian noise std added to presets
  prefill_guided_presets:
    - [0.80, -0.50, 0.50,  0.00, 0.00]    # forward (standard traveling wave)
    - [0.70, -0.50, 0.50,  0.60, 0.00]    # turn_left (head bias +0.6)
    - [0.70, -0.50, 0.50, -0.60, 0.00]    # turn_right (head bias -0.6)
    - [0.80, -0.50, 0.50,  0.00, 0.60]    # ascend (barrel-roll +roll)
    - [0.80, -0.50, 0.50,  0.00, -0.60]   # descend (barrel-roll -roll)
    - [1.00, -1.00, 0.80,  0.00, 0.00]    # fast forward (high amplitude + freq)

  # OU noise for temporally correlated exploration (wave control needs smooth actions)
  explore_noise: 'ou'
  ou_theta: 0.12     # slightly lower than turtle (0.15): eel's 8-segment chain needs smoother transitions
  ou_sigma: 0.25     # slightly lower than turtle (0.3): eel wave is more sensitive to parameter jumps
  ou_dt: 1.0         # time step

# ── Low-power Eel switch configs (for machines with limited PSU / thermal headroom) ──
# Key changes vs standard eel_multitask_switch:
#   1. LBM grid:  150×250×60 → 120×200×50  (voxels ↓56%, biggest GPU saver)
#   2. Envs:      2 → 1                     (fewer parallel envs)
#   3. Dreamer:   512-unit → 256-unit        (params ↓~75%)
#   4. Batch:     16×64 → 8×48              (training memory ↓~63%)
#   5. train_ratio: 512 → 256               (gradient steps per env step ↓50%)
#   6. imag_horizon: 15 → 10               (imagination rollout shorter)
#   7. control_mode: wave → direct          (simpler control mode)
# Reward weights & physics behavior are IDENTICAL to standard config.
# Expected GPU utilization: ~40-55% of standard config.

eel_multitask_switch_lowpower:
  env_type: 'eel_multitask'
  time_limit: 2000
  lbm_nx: 120
  lbm_ny: 200
  lbm_nz: 50
  lbm_scale: 0.5
  fluid_density: 1000.0
  per_frame_steps: 10
  task_switch_interval: 200
  enabled_tasks: [forward, turn_left, turn_right, ascend, descend]
  control_mode: 'direct'

  # Reward weights (unchanged — physics behavior should stay the same)
  reward_w_task: 1.0
  reward_w_roll: 0.20
  reward_w_smooth: 0.03
  reward_w_offaxis: 0.04
  target_forward_vel: 0.12
  target_yaw_rate: 0.08
  target_vertical_vel: 0.05

  # Frequency-domain PD control
  k_harmonics: 2
  b_bar: 1.0
  use_reduced_order: true

  # ── Reduced training footprint ──
  steps: 2e6
  action_repeat: 1
  envs: 1
  prefill: 2000
  batch_size: 8
  batch_length: 48
  train_ratio: 256
  eval_every: 24000
  eval_episode_num: 1
  video_pred_log: false

  # ── Smaller Dreamer world model ──
  dyn_hidden: 256
  dyn_deter: 256
  dyn_stoch: 24
  dyn_discrete: 24
  units: 256
  imag_horizon: 10

  encoder: {mlp_keys: '.*', cnn_keys: '$^', mlp_layers: 4, mlp_units: 512}
  decoder: {mlp_keys: '.*', cnn_keys: '$^', mlp_layers: 4, mlp_units: 512}

  # Guided prefill: inject heuristic direct actions during prefill for better exploration
  # Each preset is [head_yaw, front_yaw, mid_yaw, tail_yaw, all_roll]
  prefill_guided_ratio: 0.5      # 50% of prefill steps use guided actions
  prefill_guided_noise: 0.15     # Gaussian noise std added to presets
  prefill_guided_presets:
    - [ 0.00,  0.30,  0.50,  0.70, 0.00]    # forward (progressive wave, head→tail)
    - [ 0.60,  0.30,  0.20,  0.50, 0.00]    # turn_left (head bias left + tail swing)
    - [-0.60, -0.30, -0.20, -0.50, 0.00]    # turn_right (head bias right + tail swing)
    - [ 0.00,  0.30,  0.50,  0.70, 0.60]    # ascend (wave + barrel-roll)
    - [ 0.00,  0.30,  0.50,  0.70,-0.60]    # descend (wave + barrel-roll)

# 3D Eel Multi-Task — no-speed direction-distance goal (Dreamer)
eel_multitask_nospeed_dirdist:
  env_type: 'eel_multitask'
  time_limit: 2000
  lbm_nx: 150
  lbm_ny: 250
  lbm_nz: 60
  lbm_scale: 0.5
  fluid_density: 1000.0
  per_frame_steps: 10

  # Multi-task settings
  task_switch_interval: 0
  enabled_tasks: [forward, turn_left, turn_right, ascend, descend]
  control_mode: 'wave'

  # Reward scales / regularization
  reward_w_task: 1.0
  reward_w_roll: 0.20
  reward_w_smooth: 0.03
  reward_w_offaxis: 0.04
  target_forward_vel: 0.12
  target_yaw_rate: 0.08
  target_vertical_vel: 0.05

  # No-speed + direction-distance goal reward
  # dist_min is small for cold-start (easy nearby goals to bootstrap forward swimming),
  # dist_max is large to encourage sustained swimming once the agent is capable.
  # goal_threshold is tightened to match the small-distance regime.
  disable_speed_targets: true
  use_direction_dist_tasks: true
  direction_dist_min: 0.12
  direction_dist_max: 0.25
  direction_goal_threshold: 0.06
  direction_dist_w_dist: 40.0
  direction_dist_w_roll: 0.3
  direction_dist_w_heading: 0.3
  direction_dist_w_forward: 0.2
  direction_dist_w_smooth: 0.15
  direction_dist_w_offaxis: 0.0
  direction_dist_goal_bonus: 10.0
  direction_dist_terminate_on_goal: true

  # Control
  k_harmonics: 2
  b_bar: 1.0
  use_reduced_order: true

  # Dreamer training
  logdir: 'logdir/eel_multitask_nospeed_dirdist'
  steps: 2e6
  action_repeat: 1
  envs: 4
  prefill: 4000
  train_ratio: 512
  eval_every: 24000
  eval_episode_num: 1
  video_pred_log: false
  encoder: {mlp_keys: '.*', cnn_keys: '$^'}
  decoder: {mlp_keys: '.*', cnn_keys: '$^'}

# 3D Eel Multi-Task — no-speed direction-distance goal, low-power (Dreamer)
