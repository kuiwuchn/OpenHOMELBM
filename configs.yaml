# 3D Manta local-goal low-level training in a two-pillar figure-8 terrain scene
manta_terrain_local_goal:
  env_type: 'manta_terrain_local_goal'
  time_limit: 2000
  lbm_nx: 200
  lbm_ny: 200
  lbm_nz: 80
  lbm_scale: 1.0
  fluid_density: 1000.0
  per_frame_steps: 10

  # Local-goal tracking settings
  task_switch_interval: 0
  enabled_tasks: [forward]
  control_mode: 'direct'
  disable_speed_targets: true
  use_direction_dist_tasks: true
  direction_dist_min: 0.12
  direction_dist_max: 0.25
  direction_goal_threshold: 0.06
  direction_dist_w_dist: 40.0
  direction_dist_w_roll: 0.3
  direction_dist_w_heading: 0.3
  direction_dist_w_forward: 0.2
  direction_dist_goal_bonus: 10.0
  direction_dist_terminate_on_goal: false

  # Keep the existing local-goal reward scales
  reward_w_task: 1.0
  reward_w_roll: 0.10
  reward_w_smooth: 0.015
  reward_w_offaxis: 0.02
  target_forward_vel: 0.20
  target_yaw_rate: 0.15
  target_vertical_vel: 0.12

  # Terrain / figure-8 scene
  terrain_variant: 'figure8'
  obstacle_collision_radius: 0.04
  trajectory_points: 120
  trajectory_lookahead: 6
  trajectory_search_window: 18
  trajectory_waypoint_threshold: 0.05
  trajectory_radius_scale: 0.84
  start_on_trajectory: true
  trajectory_start_idx: 75
  align_start_to_goal: true

  # Control
  k_harmonics: 2
  b_bar: 1.0
  use_reduced_order: true

  # Dreamer training
  logdir: 'logdir/manta_terrain_local_goal_figure8'
  steps: 2e6
  action_repeat: 1
  envs: 4
  prefill: 4000
  train_ratio: 512
  eval_every: 24000
  eval_episode_num: 1
  video_pred_log: false
  encoder: {mlp_keys: '.*', cnn_keys: '$^'}
  decoder: {mlp_keys: '.*', cnn_keys: '$^'}

# 3D Manta figure-8 local-goal training with reduced-order direct control
